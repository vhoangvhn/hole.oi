<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hole.io Puzzle - Tún Hùn Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; }
        canvas { background-color: #883ce6; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); cursor: none; }
        /* Hiệu ứng loading */
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #a855f7; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4">

    <div id="game-container" class="w-full max-w-4xl bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 relative">
        
        <div id="menu-screen" class="flex flex-col items-center justify-center py-12">
            <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 text-center">TÚN HÙN PUZZLE</h1>
            <p class="text-sm text-purple-400 font-bold uppercase tracking-widest mb-10">Image Edition - 50 Levels</p>
            
            <div id="loading-area" class="flex flex-col items-center mb-8">
                <div class="spinner mb-4"></div>
                <p class="text-gray-400 text-sm">Đang tải hình ảnh vũ trụ...</p>
            </div>

            <button id="start-btn" class="hidden px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-xl font-bold rounded-xl hover:scale-105 transition transform duration-200 shadow-lg cursor-pointer transition-opacity duration-500 opacity-0">
                BẮT ĐẦU CHIẾN DỊCH
            </button>
        </div>

        <div id="play-screen" class="hidden">
            <div class="flex justify-between items-center mb-4 bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div>
                    <span class="text-xs text-gray-400 block uppercase font-bold tracking-wider">Màn chơi</span>
                    <span id="level-txt" class="text-2xl font-black text-purple-400">1/50</span>
                </div>
                <div class="flex-1 mx-8">
                    <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
                        <span>KÍCH THƯỚC HỐ: <span id="size-txt">16</span></span>
                        <span>MỤC TIÊU: <span id="target-txt">45</span></span>
                    </div>
                    <div class="w-full bg-gray-700 h-3 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-xs text-gray-400 block uppercase font-bold tracking-wider">Thời gian</span>
                    <span id="timer-txt" class="text-2xl font-black text-amber-400">30s</span>
                </div>
            </div>

            <div class="relative flex justify-center">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
            </div>
        </div>

        <div id="result-overlay" class="hidden absolute inset-0 bg-black/80 rounded-2xl flex flex-col items-center justify-center p-6 z-10">
            <h2 id="result-title" class="text-4xl font-black mb-2 tracking-wide">CHIẾN THẮNG!</h2>
            <p id="result-desc" class="text-gray-300 mb-6 text-center">Bạn đã hoàn thành màn chơi xuất sắc.</p>
            <div class="flex gap-4">
                <button id="restart-btn" class="px-6 py-3 bg-gray-700 hover:bg-gray-600 font-bold rounded-lg transition cursor-pointer">Chơi lại</button>
                <button id="next-btn" class="px-6 py-3 bg-purple-600 hover:bg-purple-500 font-bold rounded-lg transition cursor-pointer">Màn tiếp theo</button>
            </div>
        </div>

    </div>

    <script>
        // --- CẤU HÌNH & QUẢN LÝ TÀI NGUYÊN HÌNH ẢNH ---
        const assetsConfig = {
            food: 'images/food.png',       // Quả cầu vàng
            box: 'images/box.png',         // Thùng gỗ
            truck: 'images/truck.png',     // Xe tải xanh
            building: 'images/building.png', // Tòa nhà xanh
            bomb: 'images/bomb.png',       // Quả bom
            hole: 'images/hole.png'        // Hình ảnh hố đen người chơi
        };

        // Đối tượng lưu trữ các Image object đã tải xong
        const loadedImages = {};

        // Hàm tải toàn bộ hình ảnh
        function loadAllAssets(callback) {
            let loadedCount = 0;
            const keys = Object.keys(assetsConfig);
            const totalCount = keys.length;

            if (totalCount === 0) { callback(); return; }

            keys.forEach(key => {
                const img = new Image();
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === totalCount) { callback(); }
                };
                img.onerror = () => {
                    console.error("Không thể tải hình ảnh cho: " + key);
                    loadedCount++; 
                    if (loadedCount === totalCount) { callback(); }
                };
                img.src = assetsConfig[key];
                loadedImages[key] = img; 
            });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const menuScreen = document.getElementById('menu-screen');
        const playScreen = document.getElementById('play-screen');
        const resultOverlay = document.getElementById('result-overlay');
        const loadingArea = document.getElementById('loading-area');
        const startBtn = document.getElementById('start-btn');

        const levelTxt = document.getElementById('level-txt');
        const sizeTxt = document.getElementById('size-txt');
        const targetTxt = document.getElementById('target-txt');
        const timerTxt = document.getElementById('timer-txt');
        const progressBar = document.getElementById('progress-bar');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');

        startBtn.addEventListener('click', () => startGame(1));
        document.getElementById('restart-btn').addEventListener('click', () => startGame(currentLevel));
        document.getElementById('next-btn').addEventListener('click', () => startGame(currentLevel + 1));

        let currentLevel = 1;
        let isPlaying = false;
        let timeLeft = 0;
        let timerInterval;
        
        let hole = { x: 400, y: 250, radius: 16, targetRadius: 16 };
        let mouse = { x: 400, y: 250 };
        let items = [];

        // --- Khởi tạo dữ liệu 50 màn chơi ---
        const levelsData = {};
        for (let i = 1; i <= 50; i++) {
            let levelItems = [];
            let virtualHoleSize = 16;
            let numTier1 = 5 + Math.floor(i * 0.4);
            let numTier2 = i >= 2 ? 3 + Math.floor(i * 0.3) : 0;
            let numTier3 = i >= 5 ? 2 + Math.floor(i * 0.2) : 0;
            let numTier4 = i >= 12 ? 1 + Math.floor(i * 0.15) : 0;
            const randX = () => 60 + Math.random() * 680;
            const randY = () => 60 + Math.random() * 380;
            
            for (let j = 0; j < numTier1; j++) { levelItems.push({ x: randX(), y: randY(), r: 15, type: 'food' }); virtualHoleSize += 15 * 0.5; }
            for (let j = 0; j < numTier2; j++) { levelItems.push({ x: randX(), y: randY(), r: 25, type: 'box' }); if (virtualHoleSize > 25) virtualHoleSize += 25 * 0.5; }
            for (let j = 0; j < numTier3; j++) { levelItems.push({ x: randX(), y: randY(), r: 34, type: 'truck' }); if (virtualHoleSize > 34) virtualHoleSize += 34 * 0.5; }
            for (let j = 0; j < numTier4; j++) { levelItems.push({ x: randX(), y: randY(), r: 42, type: 'building' }); if (virtualHoleSize > 42) virtualHoleSize += 42 * 0.5; }
            
            let calculatedTarget = Math.floor(16 + (virtualHoleSize - 16) * 0.85);
            let finalTargetSize = Math.max(32 + (i * 2), calculatedTarget);
            let duration = Math.max(20, 35 + Math.floor(i * 0.3) - Math.floor(i / 4));
            
            if (i >= 3) {
                let numBombs = Math.min(14, Math.floor(i / 4) + 1);
                for (let j = 0; j < numBombs; j++) {
                    let bx, by;
                    do { bx = 80 + Math.random() * 640; by = 80 + Math.random() * 340; } while (Math.abs(bx - 400) < 110 && Math.abs(by - 250) < 110);
                    levelItems.push({ x: bx, y: by, r: 12, type: 'bomb' });
                }
            }
            levelsData[i] = { targetSize: finalTargetSize, duration: duration, items: levelItems };
        }

        // --- Tải ảnh trước khi hiện Menu ---
        loadAllAssets(() => {
            loadingArea.classList.add('hidden');
            startBtn.classList.remove('hidden');
            setTimeout(() => { startBtn.classList.remove('opacity-0'); }, 50);
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        function startGame(level) {
            if (level > 50) {
                endGame(true, "THẦN THÁNH PHÁ ĐẢO!", "Kinh điển! Bạn đã chinh phục hoàn toàn 50 thử thách.");
                return;
            }
            currentLevel = level;
            const levelData = levelsData[currentLevel];
            isPlaying = true;
            timeLeft = levelData.duration;
            items = JSON.parse(JSON.stringify(levelData.items)); 
            hole.radius = 20; hole.targetRadius = 20; hole.x = 400; hole.y = 250;
            levelTxt.innerText = currentLevel + "/50";
            targetTxt.innerText = levelData.targetSize;
            menuScreen.classList.add('hidden');
            resultOverlay.classList.add('hidden');
            playScreen.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPlaying) return;
                timeLeft--;
                timerTxt.innerText = timeLeft + "s";
                if (timeLeft <= 0) endGame(false, "HẾT GIỜ!", `Thất bại ở màn ${currentLevel}.`);
            }, 1000);
            requestAnimationFrame(gameLoop);
        }

        function endGame(isWin, title, desc) {
            isPlaying = false;
            clearInterval(timerInterval);
            resultTitle.innerText = title;
            resultTitle.className = `text-4xl font-black mb-2 tracking-wide ${isWin ? 'text-green-400' : 'text-red-500'}`;
            resultDesc.innerText = desc;
            if (isWin) {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').innerText = currentLevel === 50 ? "Xem kết quả tổng" : "Màn tiếp theo";
            } else {
                document.getElementById('next-btn').classList.add('hidden');
            }
            resultOverlay.classList.remove('hidden');
        }

        function gameLoop() {
            if (!isPlaying) return;
            updatePhysics();
            drawCanvas();
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            hole.x += (mouse.x - hole.x) * 0.12;
            hole.y += (mouse.y - hole.y) * 0.12;
            if (hole.radius < hole.targetRadius) hole.radius += 1;
            const currentLevelData = levelsData[currentLevel];
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let dx = hole.x - item.x;
                let dy = hole.y - item.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < hole.radius) {
                    if (item.type === 'bomb') { endGame(false, "BÙM CHÁT!", "Trúng bẫy bom rồi!"); return; } 
                    else if (hole.radius > item.r) {
                        hole.targetRadius += item.r * 1; 
                        items.splice(i, 1); 
                    }
                }
            }
            let progress = ((hole.radius - 16) / (currentLevelData.targetSize - 16)) * 100;
            progressBar.style.width = Math.min(progress, 100) + "%";
            sizeTxt.innerText = Math.floor(hole.radius);
            if (hole.radius >= currentLevelData.targetSize) endGame(true, "VƯỢT ẢI THÀNH CÔNG!", `Chinh phục Cấp độ ${currentLevel}!`);
        }

        // --- PHẦN VẼ CANVAS ---
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Vẽ các vật thể/Mồi puzzle bằng HÌNH ẢNH
            items.forEach(item => {
                const img = loadedImages[item.type]; 

                if (img) {
                    const diameter = item.r * 2;
                    ctx.drawImage(img, item.x - item.r, item.y - item.r, diameter, diameter);
                }

                // Cảnh báo nếu hố nhỏ hơn mồi
                if (item.type !== 'bomb' && hole.radius <= item.r) {
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.closePath();
                }
            });

            // 2. Vẽ Hố Đen (Người chơi)
            // --- A. Vẽ Aura hào quang ---
            ctx.beginPath();
            ctx.arc(hole.x, hole.y, hole.radius + 6, 0, Math.PI * 2); 
            ctx.fillStyle = 'rgba(168, 85, 247, 0.2)'; 
            ctx.fill();
            ctx.closePath();

            // --- B. Vẽ Hình ảnh Hố ---
            const holeImg = loadedImages['hole']; 
            if (holeImg) {
                const diameter = hole.radius * 2;
                ctx.drawImage(holeImg, hole.x - hole.radius, hole.y - hole.radius, diameter, diameter);
            } else {
                ctx.beginPath();
                ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#111827';
                ctx.fill();
                ctx.closePath();
            }
        } // <--- ĐÃ SỬA LỖI: Bổ sung dấu đóng ngoặc đóng hàm tại đây
    </script>
</body>
</html>
